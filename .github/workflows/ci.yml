name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: test / fmt / clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # The toolchain is pinned by rust-toolchain.toml (single source of truth for
      # local + CI). rustup auto-installs that exact channel and its listed components
      # (rustfmt, clippy), so a floating `stable` can't reintroduce surprise lint breakage.
      - name: Install pinned Rust toolchain
        run: rustup show && rustc --version

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace
